name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Read versions from package.json engines
        id: versions
        run: |
          echo "node=$(node -p \"require('./package.json').engines.node\")" >> "$GITHUB_OUTPUT"
          echo "pnpm=$(node -p \"require('./package.json').engines.pnpm\")" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.node }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - name: Install dependencies
        run: pnpm i

      - name: Build project
        run: pnpm build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: docs.4gaboards.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build/
          exclude: |
            **/.git*
            **/.git*/**